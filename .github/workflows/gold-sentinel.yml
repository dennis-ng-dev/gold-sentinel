name: Gold Sentinel

on:
  schedule:
    - cron: '*/15 * * * 1-5'
    - cron: '0 */2 * * 0,6'
  workflow_dispatch:
    inputs:
      send_telegram:
        description: 'Gửi Telegram?'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  fetch-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Fetch gold price
        env:
          GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
        run: python fetch_prices.py

      - name: Commit price data
        run: |
          git config user.name "Gold Sentinel Bot"
          git config user.email "bot@gold-sentinel"
          git add data/
          git diff --cached --quiet || git commit -m "📊 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Check if should send Telegram
        id: tg
        env:
          TELEGRAM_PAUSED: ${{ vars.TELEGRAM_PAUSED }}
        run: |
          HM=$(date -u +'%H:%M')
          H=$(date -u +'%H')
          M=$(date -u +'%M')
          MANUAL="${{ github.event.inputs.send_telegram }}"
          echo "Current UTC time: $HM"
          echo "Manual trigger: $MANUAL"
          PAUSED="$TELEGRAM_PAUSED"
          echo "Telegram paused: $PAUSED"
          # 01:00 UTC = 8h sáng VN, 13:00 UTC = 8h tối VN
          # Chỉ gửi đúng giờ :00 (M < 10 để tránh gửi lúc :05/:15 do cron delay)
          if [ "$PAUSED" = "true" ] && [ "$MANUAL" != "true" ]; then
            echo "send=false" >> $GITHUB_OUTPUT
            echo ">>> Telegram paused (TELEGRAM_PAUSED=true)"
          elif ([ "$H" = "01" ] || [ "$H" = "13" ]) && [ "$M" -lt 10 ]; then
            echo "send=true" >> $GITHUB_OUTPUT
            echo ">>> Will send Telegram at $HM"
          elif [ "$MANUAL" = "true" ]; then
            echo "send=true" >> $GITHUB_OUTPUT
            echo ">>> Manual trigger: Will send Telegram"
          else
            echo "send=false" >> $GITHUB_OUTPUT
            echo ">>> Skip Telegram (not 01:00 or 13:00 UTC)"
          fi

      - name: Send Telegram report
        if: steps.tg.outputs.send == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_2: ${{ secrets.TELEGRAM_CHAT_ID_2 }}
          GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run_daily.py
